# =============================================================================
# Spoke Infrastructure Manifest — Schema Template v1.5.0
# =============================================================================
#
# This file documents every field the builder accepts. Copy this template,
# fill in your values, and delete sections you don't need.
#
# The builder reads this manifest and generates all Terraform files, networking,
# private endpoints, DNS zones, and resource groups automatically.
#
# Legend:
#   REQUIRED  — must be provided or the builder will fail
#   OPTIONAL  — has a sensible default or can be omitted entirely
#   DERIVED   — auto-generated by the builder if omitted; explicit value = override
#   $ref:     — cross-reference to another resource's id (e.g. $ref:kv.resource_id)
#
# Naming: All Azure resource names are derived automatically from ctm_properties
# and each resource's subsystem using the pattern:
#   {type}-{product}-{subsystem}-{environment}-{location_abbr}-{instance}
#   Example: app-lb-api-dev-aue-001
#
# Plan behavior: Each web app and function app gets its own dedicated App Service
# Plan by default, created from the plan_defaults spec. Plan names are generated
# automatically: asp-{product}-{subsystem}-{environment}-{location_abbr}
# Override with share_plan_with (share another app's plan) or plan_override
# (custom SKU/OS for one app).
#
# Private endpoints & DNS: The builder auto-generates private endpoints and DNS
# zones for resources that need them (Key Vault, databases, Redis, Search, etc.).
# The network.private_endpoints and network.dns_zones sections are optional
# overrides — omit them and the builder does the right thing.
#
# Instance numbers: Auto-assigned sequentially per resource type if omitted.
# Explicit values are honored (use for stable numbering across manifest edits).
#
# Module names: Derived from resource type + OS context if omitted.
# Explicit module: is an override for edge cases.
#
# Resource groups: By default, databases get isolated RGs per type and
# everything else goes in the compute RG. Any resource can override this
# with resource_group: {name} to create/use rg-{product}-{name}-{env}-{loc}.
# If multiple resources use the same resource_group value, they share the RG.
#
# Location: All resources deploy to the environment's default location.
# Any resource can override with location: {region} to deploy elsewhere.
#
# Version: 1.7.0
# =============================================================================

schema_version: '1.7.0'

# ---------------------------------------------------------------------------
# SPOKE — Identity & metadata
# ---------------------------------------------------------------------------
spoke:
  name: my-spoke-001                    # REQUIRED — unique spoke identifier, used for repo names and TFC workspaces
  subscription: my-spoke-001            # REQUIRED — Azure subscription name (created by LZ process if new_subscription: true)
  owner: Platform Engineering           # REQUIRED — team that owns this spoke
  description: >-                       # OPTIONAL — human-readable description of what this spoke is for
    Short description of the workload.
  sku_mode: premium                     # OPTIONAL — "premium" (default) or "standard". Controls SKU tier selection.
                                        #   premium = prod-equivalent tiers at smallest size (GP postgres, P1v3 app service, etc.)
                                        #   standard = lower tiers where acceptable
  management_group_id: converge         # OPTIONAL — short management group ID (e.g. "converge", "mg-platform-prod").
                                        #   The subscription module constructs the full ARM path internally.
                                        #   Omit to leave subscription at root.
  new_subscription: true                # OPTIONAL — true = LZ process creates a new subscription. false = use existing.
                                        #   Default: true
  infra_repo: my-spoke-001-infra        # REQUIRED — GitHub repo name for generated Terraform (created by Megalodon)

# ---------------------------------------------------------------------------
# CTM PROPERTIES — Used for resource naming only
# ---------------------------------------------------------------------------
ctm_properties:
  product: myapp                        # REQUIRED — short product code used in all resource names (e.g. "lb", "gprof", "mega")
                                        #   Keep it short (2-5 chars). This appears in every resource name.
                                        #   IMPORTANT: Do NOT repeat the product code in subsystem values.
                                        #   If product is "lb", use subsystem "assets" not "lbassets".
                                        #   The builder auto-strips product prefixes with clear boundaries
                                        #   (e.g. lb-assets -> assets) but warns on ambiguous cases.

# ---------------------------------------------------------------------------
# ENVIRONMENTS — At least one required
# ---------------------------------------------------------------------------
# Each key is an environment name. Valid values: dev, test, uat, preprod, prod, lab
environments:
  dev:
    location: australiaeast             # REQUIRED — Azure region. Used for all resources in this environment.
                                        #   Common values: australiaeast, eastus, eastus2, westus3, uksouth,
                                        #   southeastasia, northcentralus, westeurope, centralus, eastasia, westus2
  # Add more environments as needed:
  # prod:
  #   location: australiaeast

# ---------------------------------------------------------------------------
# TAGS — Applied to all resources via the tags module
# ---------------------------------------------------------------------------
tags:
  CostRegion: '[TBD]'                   # REQUIRED — cost allocation region. Values: anz, asia, europe, group, usa
  CostType: '[TBD]'                     # REQUIRED — cost allocation type. Values: capex, opex
  # All other tags are optional — add any key-value pairs as needed:
  # owner: someone@travelctm.com
  # cost_center: ENG-001
  # project: my-project
  # data_classification: internal
  # business_unit: engineering

# ---------------------------------------------------------------------------
# NETWORK
# ---------------------------------------------------------------------------
# MINIMAL: just provide vnet_cidr. The builder auto-generates subnets, NSGs,
# delegations, private endpoints, and DNS zones based on what compute/data
# resources you declare. See networking-defaults.yml for the full rule set.
#
# Auto-carve creates subnets sized per resource type:
#   web_apps/function_apps → snet_appservices (/26) + delegation
#   container_apps         → snet_containerenvironment (/23) + delegation
#   aks_clusters           → snet_aks_system (/24) + snet_aks_user (/24)
#   virtual_machines       → snet_compute (/26)
#   mssql_managed_instance → snet_sqlmi (/27) + delegation
#   (always)               → snet_privateendpoints (/27)
#
# Auto-PE creates private endpoints + DNS zones for: Key Vault, databases,
# Redis, Search, Storage, ACR, App Configuration, Service Bus, SignalR.
network:

  # --- Minimal (recommended) ---
  # Just the VNet CIDR. Builder does the rest.
  vnet_cidr: 10.3.0.0/24               # REQUIRED — VNet address space. Coordinate with hub team to avoid overlap.
                                        #   /24 for app_service spokes, /22 for AKS, /23 for container_apps.
                                        #   Builder auto-sizes if you provide too small — warns in plan output.
  peering: hub-network-vnet             # OPTIONAL — hub VNet to peer with. Omit if no hub peering.
  dns_servers: hub-inherited            # OPTIONAL — "hub-inherited" (default) or list of custom DNS IPs

  # --- Overrides (only when you need to deviate from defaults) ---
  # Override a specific subnet's size:
  # subnets:
  #   - id: snet_appservices
  #     cidr: 10.3.0.0/25              # Override /26 default to /25 (128 IPs)
  #
  # Add a custom subnet not in defaults:
  #   - id: snet_bastion
  #     vnet_id: vnet
  #     cidr: 10.3.0.128/27
  #     delegation: null
  #     purpose: Azure Bastion
  #
  # Add custom NSG rules to a subnet:
  # nsgs:
  #   - id: nsg_appservices
  #     subnet_id: snet_appservices
  #     rules:
  #       - name: allow-specific-ip
  #         priority: 200
  #         direction: Inbound
  #         access: Allow
  #         protocol: Tcp
  #         source_address_prefix: 203.0.113.50
  #         destination_port_range: '443'
  #         description: Allow partner IP
  #
  # Override PE target subnet:
  # private_endpoints:
  #   - id: pe_kv
  #     subnet_id: snet_custom          # Use different subnet instead of snet_privateendpoints
  #
  # Skip auto-PE for a specific resource (set on the resource itself):
  #   data:
  #     databases:
  #       - subsystem: pg
  #         type: postgresql_flexible_server
  #         private_endpoint: false      # Opt out of auto-PE

  # --- Full explicit mode (backward compatible) ---
  # You can still declare everything manually like v1.0.0.
  # If subnets/nsgs/private_endpoints/dns_zones are present, the builder
  # uses those instead of auto-generating. Mixing is supported —
  # declare some subnets explicitly and let the builder fill in the rest.
  #
  # vnets:
  #   - id: vnet
  #     cidr: 10.3.0.0/24
  #     dns_servers: hub-inherited
  #     peering: hub-network-vnet
  # subnets:
  #   - id: snet_appservices
  #     vnet_id: vnet
  #     cidr: 10.3.0.0/26
  #     delegation: Microsoft.Web/serverFarms
  #     purpose: App Service VNet integration
  #   - id: snet_privateendpoints
  #     vnet_id: vnet
  #     cidr: 10.3.0.64/27
  #     delegation: null
  #     purpose: Private endpoints
  # nsgs:
  #   - id: nsg_appservices
  #     subnet_id: snet_appservices
  #     rules: []
  #   - id: nsg_privateendpoints
  #     subnet_id: snet_privateendpoints
  #     rules:
  #       - name: allow-vnet-inbound
  #         priority: 100
  #         direction: Inbound
  #         access: Allow
  #         protocol: '*'
  #         source_address_prefix: VirtualNetwork
  #         destination_port_range: '*'
  #       - name: deny-internet-inbound
  #         priority: 4096
  #         direction: Inbound
  #         access: Deny
  #         protocol: '*'
  #         source_address_prefix: Internet
  #         destination_port_range: '*'

# ---------------------------------------------------------------------------
# COMPUTE
# ---------------------------------------------------------------------------
compute:

  # --- Plan Defaults ---
  # Define the plan spec ONCE here. By default, every web app and function app
  # gets its OWN dedicated plan created from this spec automatically.
  # You do NOT list individual plans — the builder creates them per app.
  plan_defaults:
    web_app:
      os_type: Windows                  # REQUIRED — Windows or Linux
      sku: P1v3                         # REQUIRED — SKU name. Minimums:
                                        #   P1v3 (Premium required for VNet integration, slots)
                                        #   Dev environments use same tier, smallest size.
      plan_strategy: shared             # OPTIONAL — shared (default, auto-group N apps per plan) or dedicated (1 ASP per app)
      apps_per_plan: 4                  # OPTIONAL — apps per shared ASP (only used when plan_strategy=shared, default 4)
    function_app:
      os_type: Windows                  # REQUIRED — Windows or Linux
      sku: EP1                          # REQUIRED — SKU name. Minimums:
                                        #   EP1 (Elastic Premium required for VNet integration, always-ready)
      plan_strategy: shared             # OPTIONAL — shared (default) or dedicated
      apps_per_plan: 4                  # OPTIONAL — apps per shared ASP (default 4)

  # --- Plan assignment modes ---
  # 1. Omit plan_strategy (or set to 'shared') → auto-group 4 apps per plan (default)
  # 2. plan_strategy: shared → auto-group N apps per plan (set apps_per_plan, default 4)
  # 3. Explicit plan_id on each app → full manual control (reference compute.app_service_plans by id)
  # Modes can be mixed: some apps with plan_id, others falling back to plan_defaults.
  # Microsoft.Web throttles ASP creates at ~10 per sub per region — use shared or plan_id for large spokes.

  # --- Web Apps ---
  # Each app gets its own dedicated plan from plan_defaults.web_app unless overridden.
  web_apps:
    # Default — dedicated plan, all fields explicit
    - id: web_api                       # REQUIRED — unique ID
      subsystem: api                    # REQUIRED — naming segment (becomes part of resource name)
      module: terraform-azurerm-windows-web-app  # DERIVED — inferred from os_type in plan_defaults. Override for edge cases.
      instance_number: '001'            # DERIVED — auto-assigned sequentially if omitted
      vnet_integration_subnet_id: snet_appservices  # OPTIONAL — subnet id for VNet integration. Omit if no VNet integration.
      # resource_group: custom          # OPTIONAL — override RG placement. Creates rg-{product}-custom-{env}-{loc}.
                                        #   Default: compute RG. Databases auto-isolate by type.
                                        #   If multiple resources share the same value, they share the RG.
      # location: eastus2              # OPTIONAL — override region for this resource only.
                                        #   Default: environment's location (e.g. australiaeast).

    # Minimal — only subsystem required, everything else derived
    - subsystem: config

    # Example: share a plan with another app instead of getting a dedicated one
    - subsystem: website
      share_plan_with: web_api          # OPTIONAL — use the same plan as this app's id. Omit = dedicated plan.

    # Example: explicit plan_id — reference an ASP from compute.app_service_plans
    - subsystem: portal
      plan_id: asp-web-heavy            # OPTIONAL — reference a specific ASP by id. Overrides plan_defaults and share_plan_with.

    # Example: custom plan spec for a single app that needs more horsepower
    - subsystem: heavy-api
      plan_override:                    # OPTIONAL — override plan_defaults for this app only
        sku: P2v3                       #   Any plan_defaults field can be overridden here
        os_type: Windows

  # --- Function Apps ---
  # Each app gets its own dedicated plan from plan_defaults.function_app unless overridden.
  function_apps:
    # Default — dedicated plan, all fields explicit
    - id: func_booking-expiry           # REQUIRED — unique ID
      subsystem: booking-expiry         # REQUIRED — naming segment
      module: terraform-azurerm-windows-function-app  # DERIVED — inferred from os_type in plan_defaults
      runtime: dotnet-isolated          # REQUIRED — runtime stack. Common values:
                                        #   dotnet-isolated, node, python, java, powershell, custom
      instance_number: '001'            # DERIVED — auto-assigned sequentially if omitted
      vnet_integration_subnet_id: snet_appservices  # OPTIONAL — subnet id for VNet integration

    # Minimal — subsystem + runtime required, everything else derived
    - subsystem: notifications
      runtime: dotnet-isolated

    # Example: shared plan — these two functions run on the same plan
    - subsystem: config-processor
      runtime: dotnet-isolated
      share_plan_with: func_booking-expiry  # OPTIONAL — share a plan instead of dedicated

    # Example: custom plan override for a function that needs a bigger SKU
    - subsystem: heavy-processor
      runtime: dotnet-isolated
      plan_override:                    # OPTIONAL — override plan_defaults for this app only
        sku: EP2

  # --- Static Sites ---
  # OPTIONAL section — only if you have static web apps (React, Angular, etc.)
  static_sites:
    - id: swa_frontend                  # DERIVED — auto-generated from subsystem if omitted
      subsystem: frontend               # REQUIRED — naming segment
      module: terraform-azurerm-static-web-app  # DERIVED
      sku: Standard                     # REQUIRED — Standard or Free
      instance_number: '001'            # DERIVED
      location: eastasia                # OPTIONAL — override default location (Static Sites have limited region availability)

  # --- Container Apps ---
  # OPTIONAL section — for containerized workloads on Azure Container Apps.
  # The builder auto-creates a Container App Environment if container_apps are declared.
  container_app_environment:
    subsystem: compute                  # REQUIRED — naming segment
    infrastructure_subnet_id: snet_containerenvironment  # REQUIRED — subnet id (/23 minimum)
    log_analytics_workspace_id: law     # OPTIONAL — defaults to observability.log_analytics_workspace id

  container_apps:
    - subsystem: my-api                 # REQUIRED — naming segment
      module: terraform-azurerm-container-app  # DERIVED
      instance_number: '001'            # DERIVED
      image: mcr.microsoft.com/hello-world:latest  # REQUIRED — container image
      cpu: 0.5                          # OPTIONAL — default 0.5
      memory: 1.0                       # OPTIONAL — default 1.0 (in Gi)
      min_replicas: 0                   # OPTIONAL — default 0
      max_replicas: 3                   # OPTIONAL — default 3
      target_port: 80                   # OPTIONAL — ingress port
      transport: auto                   # OPTIONAL — auto, http, http2, tcp

  # --- AKS ---
  # OPTIONAL section — for Kubernetes workloads.
  aks_clusters:
    - subsystem: compute                # REQUIRED — naming segment
      module: terraform-azurerm-aks     # DERIVED
      instance_number: '001'            # DERIVED
      kubernetes_version: '1.29'        # OPTIONAL — defaults to latest stable
      sku_tier: Standard                # OPTIONAL — Free or Standard. Standard for SLA.
      default_node_pool:
        vm_size: Standard_D2s_v5        # REQUIRED — node VM size
        node_count: 2                   # OPTIONAL — default 2
        min_count: 1                    # OPTIONAL — for autoscaling
        max_count: 5                    # OPTIONAL — for autoscaling
        os_disk_size_gb: 128            # OPTIONAL — default 128
        vnet_subnet_id: snet_aks_system # REQUIRED — subnet id for system node pool
      node_pools:                       # OPTIONAL — additional user node pools
        - name: user                    # REQUIRED — pool name
          vm_size: Standard_D4s_v5
          min_count: 1
          max_count: 10
          vnet_subnet_id: snet_aks_user
      flux_configurations:              # OPTIONAL — GitOps via Flux
        - name: infra
          namespace: flux-system
          git_repository_url: https://github.com/my-org/my-k8s-config
          branch: main
          path: ./clusters/dev

  # --- Virtual Machines ---
  # OPTIONAL section — for IaaS workloads.
  virtual_machines:
    - subsystem: jumpbox                # REQUIRED — naming segment
      module: terraform-azurerm-linux-vm  # DERIVED — linux-vm or windows-vm based on os_type
      os_type: Linux                    # REQUIRED — Linux or Windows
      instance_number: '001'            # DERIVED
      vm_size: Standard_D2s_v5          # REQUIRED — VM SKU
      admin_username: azureuser         # OPTIONAL — default azureuser
      subnet_id: snet_compute           # REQUIRED — subnet id
      os_disk:
        size_gb: 128                    # OPTIONAL — default 128
        storage_account_type: Premium_LRS  # OPTIONAL — default Premium_LRS
      source_image:                     # REQUIRED — marketplace image reference
        publisher: Canonical
        offer: 0001-com-ubuntu-server-jammy
        sku: 22_04-lts-gen2
        version: latest

  # --- SignalR ---
  # OPTIONAL section — for real-time messaging (WebSockets, Server-Sent Events).
  signalr:
    - subsystem: compute                # REQUIRED — naming segment
      module: terraform-azurerm-signalr-service  # DERIVED
      sku: Standard_S1                  # REQUIRED — Free_F1, Standard_S1, Premium_P1
      instance_number: '001'            # DERIVED
      service_mode: Default             # OPTIONAL — Default, Serverless, Classic

  # --- API Management ---
  # OPTIONAL section — for API gateway.
  apim:
    id: apim                            # DERIVED
    subsystem: compute                  # REQUIRED — naming segment
    module: terraform-azurerm-api-management  # DERIVED
    sku: Developer_1                    # REQUIRED — Developer_1, Basic_1, Standard_1, Premium_1
    publisher_name: My Org              # REQUIRED — org name for APIM portal
    publisher_email: api@example.com    # REQUIRED — contact email
    instance_number: '001'              # DERIVED

# ---------------------------------------------------------------------------
# DATA
# ---------------------------------------------------------------------------
data:

  # --- Databases ---
  # Each database type gets its own isolated resource group automatically (CTM §18).
  # OPTIONAL section — omit entirely if no databases needed.
  databases:
    # Cosmos DB
    - id: cosmos                        # DERIVED — auto-generated from type + subsystem if omitted
      subsystem: cosmos                 # REQUIRED — naming segment
      type: cosmos_account              # REQUIRED — database type. Determines RG isolation. Valid values:
                                        #   cosmos_account, mssql_server, postgresql_flexible_server,
                                        #   mssql_managed_instance, mysql_flexible_server
      module: terraform-azurerm-cosmos-account  # DERIVED — inferred from type
      sku: serverless                   # REQUIRED — type-specific SKU. Examples:
                                        #   cosmos: serverless, provisioned
                                        #   mssql_server: GP_Gen5_2, GP_Gen5_4
                                        #   postgresql_flexible_server: GP_Standard_D2s_v3 (minimum, never Burstable)
      databases:                        # OPTIONAL — informational only. Terraform does NOT create these.
        - my-db                         #   Database creation is an app team concern (CREATE DATABASE / migrations).
        - my-db-archive                 #   Listed here for documentation / schooling purposes.

    # SQL Server — minimal
    - subsystem: sql
      type: mssql_server
      sku: GP_Gen5_2
      databases:
        - app-db
        - app-db-archive

    # PostgreSQL — minimal
    # - subsystem: pg
    #   type: postgresql_flexible_server
    #   sku: GP_Standard_D2s_v3         # Never Burstable — General Purpose minimum

  # --- Storage Accounts ---
  # OPTIONAL section — for blob, queue, table, or file storage.
  # Storage account names have NO hyphens: st{product}{subsystem}{env}{location}{instance}
  # Example: stlbabordevaue001
  storage_accounts:
    # Dedicated storage for a specific workload
    - subsystem: assets                 # REQUIRED — naming segment
      module: terraform-azurerm-storage-account  # DERIVED
      sku: Standard_LRS                 # OPTIONAL — default Standard_LRS. Values:
                                        #   Standard_LRS, Standard_GRS, Standard_ZRS, Standard_GZRS,
                                        #   Premium_LRS, Premium_ZRS
      kind: StorageV2                   # OPTIONAL — default StorageV2. Values: StorageV2, BlobStorage
      instance_number: '001'            # DERIVED

    # Function app backing storage (auto-created per function app if not declared,
    # but declare explicitly if you need to control the name or replication)
    - subsystem: functions
      sku: Standard_LRS

  # --- Caching ---
  # OPTIONAL section — Redis lives in the compute RG by default (not isolated like databases).
  # Use resource_group to isolate if needed.
  caching:
    - id: redis                         # DERIVED
      subsystem: compute                # REQUIRED
      module: terraform-azurerm-managed-redis  # DERIVED
      sku: Balanced_B0                  # REQUIRED — Minimum: Balanced_B0 (supports private endpoints). Never Basic.
      # resource_group: redis           # OPTIONAL — override to isolate Redis in its own RG
      # location: eastus2              # OPTIONAL — override region for this resource

  # --- Search ---
  # OPTIONAL section
  search:
    - subsystem: compute                # REQUIRED
      sku: standard                     # REQUIRED — standard, basic, free, etc.

  # --- Data Factories ---
  # OPTIONAL section
  factories:
    - subsystem: compute                # REQUIRED

  # --- Backup Vaults ---
  # OPTIONAL section — for Azure Backup policies and protected items.
  backup_vaults:
    - subsystem: compute                # REQUIRED — naming segment
      module: terraform-azurerm-backup-vault  # DERIVED
      instance_number: '001'            # DERIVED
      redundancy: LocallyRedundant      # OPTIONAL — LocallyRedundant (default), GeoRedundant, ZoneRedundant

  # --- Messaging (Service Bus) ---
  # OPTIONAL section — for queues, topics, and pub/sub messaging.
  messaging:
    - subsystem: compute                # REQUIRED — naming segment
      module: terraform-azurerm-servicebus-namespace  # DERIVED
      sku: Standard                     # REQUIRED — Basic, Standard, or Premium
                                        #   Premium required for private endpoints, VNet integration
      instance_number: '001'            # DERIVED
      queues:                           # OPTIONAL — list of queue names (builder generates child modules)
        - order-processing
        - notifications
      topics:                           # OPTIONAL — list of topic names (builder generates child modules)
        - events

# ---------------------------------------------------------------------------
# SECURITY
# ---------------------------------------------------------------------------
security:

  # --- Entra ID Groups ---
  entra_groups: false                     # OPTIONAL — default false. When true, the LZ template creates
                                          #   dba, app-team, and sre security groups for this spoke.
                                          #   Groups are idempotent — safe to enable on re-runs.

  # --- Key Vaults ---
  # Most spokes need exactly one Key Vault.
  key_vaults:
    - id: kv                            # DERIVED — auto-generated if omitted
      subsystem: myapp                  # REQUIRED — naming segment. Often same as product code.
                                        #   Key Vault names are compact (max 24 chars) — subsystem may be shortened.
      module: terraform-azurerm-key-vault  # DERIVED
      access_model: RBAC                # OPTIONAL — RBAC (default, recommended) or access_policy
      consumers: []                     # OPTIONAL — list of consumer references for RBAC role assignments

  # --- Container Registries ---
  # OPTIONAL — for Docker/OCI image hosting.
  container_registries:
    - subsystem: compute                # REQUIRED — naming segment
      module: terraform-azurerm-container-registry  # DERIVED
      sku: Premium                      # REQUIRED — Basic, Standard, or Premium
                                        #   Premium required for private endpoints, geo-replication
      instance_number: '001'            # DERIVED
      consumers:                        # OPTIONAL — list of compute resource ids that need AcrPull access
        - web_api                       #   Builder generates azurerm_role_assignment for each consumer
      georeplications:                  # OPTIONAL — Premium only. List of replication regions.
        - location: eastus2
          zone_redundancy_enabled: true
      managed_identities:               # OPTIONAL — identity for the registry itself
        system_assigned: true

  # --- User-Assigned Managed Identities ---
  # OPTIONAL — create identities for workloads that need them (function apps, web apps, etc.)
  managed_identities:
    - subsystem: functions              # REQUIRED — naming segment
      instance_number: '001'            # DERIVED

    - subsystem: webjobs
      instance_number: '002'            # DERIVED

# ---------------------------------------------------------------------------
# APP CONFIGURATION
# ---------------------------------------------------------------------------
# OPTIONAL section — for centralized app settings (feature flags, key-value config).
app_configuration:
  - subsystem: compute                  # REQUIRED — naming segment
    module: terraform-azurerm-app-configuration  # DERIVED
    sku: standard                       # OPTIONAL — free or standard. Standard for private endpoints.
    instance_number: '001'              # DERIVED

# ---------------------------------------------------------------------------
# AI
# ---------------------------------------------------------------------------
# OPTIONAL section — for Azure AI / OpenAI resources.
ai:
  foundry:
    - subsystem: compute                # REQUIRED — naming segment
      module: terraform-azurerm-ai-foundry  # DERIVED
      instance_number: '001'            # DERIVED
      sku: S0                           # OPTIONAL — default S0
      projects:                         # OPTIONAL — AI Foundry projects (child resources)
        - name: my-project              # REQUIRED — project name
          display_name: My AI Project   # OPTIONAL — human-readable name

# ---------------------------------------------------------------------------
# FRONT DOOR
# ---------------------------------------------------------------------------
# OPTIONAL section — for global load balancing, WAF, and CDN.
# Front Door is a multi-resource stack: profile → endpoint → origin group → origin → route.
# The builder generates the full stack from this declaration.
frontdoor:
  profile:
    subsystem: compute                  # REQUIRED — naming segment
    module: terraform-azurerm-cdn-frontdoor-profile  # DERIVED
    sku: Standard_AzureFrontDoor        # REQUIRED — Standard_AzureFrontDoor or Premium_AzureFrontDoor
                                        #   Premium required for private link origins and WAF with managed rules

  endpoints:
    - subsystem: web                    # REQUIRED — naming segment
      instance_number: '001'            # DERIVED

  origin_groups:
    - id: og_web                        # REQUIRED — unique ID
      subsystem: web                    # REQUIRED
      health_probe:                     # OPTIONAL — health probe settings
        path: /health
        protocol: Https
        interval_in_seconds: 30

  origins:
    - id: origin_web                    # REQUIRED — unique ID
      origin_group_id: og_web           # REQUIRED — must match an origin_groups id
      host_name: $ref:web_api.default_hostname  # REQUIRED — origin hostname ($ref or literal)
      http_port: 80                     # OPTIONAL — default 80
      https_port: 443                   # OPTIONAL — default 443

  routes:
    - id: route_web                     # REQUIRED — unique ID
      endpoint_id: web                  # REQUIRED — must match an endpoints subsystem
      origin_group_id: og_web           # REQUIRED — must match an origin_groups id
      patterns_to_match: ["/*"]         # OPTIONAL — default ["/*"]
      supported_protocols: [Http, Https]  # OPTIONAL
      https_redirect_enabled: true      # OPTIONAL — default true

  # WAF policy — OPTIONAL, requires Premium SKU
  # waf_policy:
  #   subsystem: compute
  #   module: terraform-azurerm-cdn-frontdoor-firewall-policy
  #   mode: Prevention                  # Detection or Prevention
  #   managed_rules:
  #     - type: Microsoft_DefaultRuleSet
  #       version: "2.1"
  #   security_policy:
  #     endpoint_ids: [web]             # Which endpoints this WAF protects

# ---------------------------------------------------------------------------
# OBSERVABILITY
# ---------------------------------------------------------------------------
observability:

  # --- Log Analytics Workspace ---
  # One per spoke. Most spokes need this.
  log_analytics_workspace:
    id: law                             # DERIVED
    subsystem: myapp                    # REQUIRED — naming segment
    module: terraform-azurerm-log-analytics-workspace  # DERIVED
    retention_days: 30                  # OPTIONAL — default 30. Range: 30-730.

  # --- Application Insights ---
  # OPTIONAL — one or more App Insights instances linked to the workspace.
  app_insights:
    - subsystem: myapp                  # REQUIRED
      module: terraform-azurerm-application-insights  # DERIVED
      workspace_id: law                 # DERIVED — defaults to the log_analytics_workspace id if only one exists

# ---------------------------------------------------------------------------
# DEPENDENCIES — External resources this spoke connects to
# ---------------------------------------------------------------------------
# OPTIONAL section — declare external dependencies for documentation and hub peering.
dependencies:
  - name: hub-network-vnet              # REQUIRED — identifier for the dependency
    type: vnet_peering                  # REQUIRED — dependency type (vnet_peering, dns_forwarding, etc.)
    direction: bidirectional            # OPTIONAL — bidirectional (default) or outbound-only
    notes: DNS resolution, on-prem connectivity via hub VPN  # OPTIONAL — context for operators
