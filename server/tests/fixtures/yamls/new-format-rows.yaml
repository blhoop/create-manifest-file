
spoke:
  name: multi-001
  owner: Team

ctm_properties:
  product: multi

environments:
  prod:
    location: eastus

tags:
  owner: Team
  cost_center: CC-1
  project: multi
  data_classification: internal

network:
  vnets: []
  subnets: []
  nsgs: []
  private_endpoints: []
  dns_zones: []

compute:
  app_service_plans:
    - id: asp_web
      subsystem: web
      module: terraform-azurerm-app-service-plan
      os_type: Linux
      sku: P1v3
  web_apps:
    - id: web_api
      subsystem: api
      module: terraform-azurerm-linux-web-app
      asp_id: asp_web
      instance_number: '001'
  function_apps:
    - id: func_worker
      subsystem: worker
      module: terraform-azurerm-windows-function-app
      runtime: node
      instance_number: '001'
  static_sites:
    - id: swa_frontend
      subsystem: frontend
      module: terraform-azurerm-static-web-app
      sku: Standard
      instance_number: '001'

data:
  databases:
    - id: pg
      subsystem: pg
      type: postgresql_flexible_server
      module: terraform-azurerm-postgresql-flexible-server
      sku: GP_Standard_D2s_v3
    - id: cosmos
      subsystem: cosmos
      type: cosmos_account
      module: terraform-azurerm-cosmos-account
  caching:
    - id: redis
      subsystem: cache
      module: terraform-azurerm-managed-redis
      sku: Balanced_B0
  search:
    - id: search
      subsystem: search
      module: terraform-azurerm-search-service
      sku: standard
  factories:
    - id: adf
      subsystem: adf
      module: terraform-azurerm-data-factory

security:
  key_vaults:
    - id: kv
      subsystem: multi
      module: terraform-azurerm-key-vault
      access_model: RBAC
      consumers: []
  managed_identities:
    - id: mi_functions
      subsystem: functions
      module: terraform-azurerm-user-assigned-identity
      instance_number: '001'

observability:
  log_analytics_workspace:
    id: law
    subsystem: multi
    module: terraform-azurerm-log-analytics-workspace
  app_insights:
    - id: appi
      subsystem: multi
      module: terraform-azurerm-application-insights
      workspace_id: law

dependencies: []
